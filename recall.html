<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Recall</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<h2>กำลังโหลด...</h2>

<script>
async function main() {
  await liff.init({ liffId: "2009694296-3EmrAnYR" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  await fetch("https://script.google.com/macros/s/AKfycbx2ozaTZaytiNmarcquRRR5OS1wDjoFxjPjgmLQDyMCwr1Blldoo00AbgBORZmzexkgUw/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userId: profile.userId,
      name: profile.displayName,
      type: "recall"
    })
  });

  document.body.innerHTML = "<h2>บันทึก recall สำเร็จ</h2>";
}
main();
</script>

</body>
</html>
